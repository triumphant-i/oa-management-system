server:
  port: 8080

spring:
  application:
    name: oa-management-service

  # ========== MySQL 数据库配置 ==========
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/oa_system?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: 'zyx251026'

  # ========== Redis 缓存配置 ==========
  redis:
    host: localhost
    port: 6379
    password:          # 如果有密码请填写
    database: 0
    timeout: 3000ms
    lettuce:
      pool:
        max-active: 8
        max-wait: -1ms
        max-idle: 8
        min-idle: 0

  # ========== Elasticsearch 全文检索配置 ==========
  elasticsearch:
    uris: http://localhost:9200
    username:           # 如果有用户名请填写
    password:           # 如果有密码请填写
    connection-timeout: 5s
    socket-timeout: 30s

  # ========== Spring Cache 缓存配置 ==========
  cache:
    type: redis
    redis:
      time-to-live: 3600000  # 缓存过期时间1小时
      cache-null-values: false
      use-key-prefix: true
      key-prefix: oa_cache:

  # ========== 文件上传配置 ==========
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# ========== MyBatis-Plus 配置 ==========
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
  mapper-locations: com/southwind/mapper/xml/*.xml
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# ========== 日志配置 ==========
logging:
  level:
    com.southwind: debug
    org.springframework.data.redis: debug
    org.springframework.data.elasticsearch: debug

